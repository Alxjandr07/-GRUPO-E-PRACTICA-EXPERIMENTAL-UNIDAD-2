<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | SGROAS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: linear-gradient(135deg, #1a3a5c 0%, #0d1f33 100%); min-height: 100vh; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 10px 30px rgba(0,0,0,.4); }
        .btn-register { background-color: #57B9FF; border: none; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-4">
<div class="container" style="max-width: 450px;">
    <div class="text-center mb-4">
        <i class="bi bi-bus-front-fill fs-1 text-white"></i>
        <h2 class="text-white mt-2 fw-bold">SGROAS</h2>
    </div>
    <div class="card p-4">
        <h5 class="card-title fw-bold mb-3">Crear cuenta</h5>

        <form th:action="@{/auth/register}" th:object="${registroDto}" method="post" novalidate>

            <div class="mb-3">
                <label class="form-label fw-semibold">Nombre completo</label>
                <input type="text" class="form-control" th:field="*{nombre}"
                       th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'" placeholder="Juan Pérez">
                <div class="invalid-feedback" th:errors="*{nombre}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Correo electrónico</label>
                <input type="email" class="form-control" th:field="*{email}"
                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" placeholder="correo@sgroas.ec">
                <div class="invalid-feedback" th:errors="*{email}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Contraseña</label>
                <input type="password" class="form-control" th:field="*{password}"
                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                       placeholder="Mín. 8 chars, 1 mayúscula, 1 número">
                <div class="invalid-feedback" th:errors="*{password}"></div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Confirmar contraseña</label>
                <input type="password" class="form-control" th:field="*{password2}"
                       th:classappend="${#fields.hasErrors('password2')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{password2}"></div>
            </div>

            <button type="submit" class="btn btn-register text-white w-100 fw-semibold">
                <i class="bi bi-person-plus me-2"></i>Registrarse
            </button>
        </form>

        <hr class="my-3">
        <div class="text-center">
            <a th:href="@{/auth/login}" class="text-decoration-none small">¿Ya tiene cuenta? Inicie sesión</a>
        </div>
    </div>
</div>
</body>
</html>
