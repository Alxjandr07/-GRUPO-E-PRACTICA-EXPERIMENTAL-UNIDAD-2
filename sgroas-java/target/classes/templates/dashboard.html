<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SGROAS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root{--sgroas-blue:#57B9FF;--sgroas-dark:#1a3a5c}
        .navbar-brand{color:var(--sgroas-blue)!important}
        .btn-primary{background-color:var(--sgroas-blue);border-color:var(--sgroas-blue)}
        .sidebar{min-height:calc(100vh - 56px);background-color:var(--sgroas-dark)}
        .sidebar .nav-link{color:rgba(255,255,255,.75)}
        .sidebar .nav-link:hover{color:var(--sgroas-blue)}
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand fw-bold">
        <i class="bi bi-bus-front-fill me-2" style="color:var(--sgroas-blue)"></i>SGROAS
        <small class="text-white-50 ms-2" style="font-size:.7rem">Java/Spring Boot</small>
    </span>
    <div class="d-flex align-items-center gap-3">
        <span class="text-white-50 small">
            <i class="bi bi-person-circle me-1"></i>
            <span sec:authentication="name">Usuario</span>
        </span>
        <form th:action="@{/auth/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-outline-danger btn-sm">
                <i class="bi bi-box-arrow-right me-1"></i>Salir
            </button>
        </form>
    </div>
</nav>
<div class="container-fluid"><div class="row">
    <nav class="col-md-2 sidebar py-3 d-none d-md-block">
        <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/conductores}"><i class="bi bi-person-badge me-2"></i>Conductores</a></li>
        </ul>
    </nav>
    <main class="col-md-10 ms-sm-auto px-4 py-3">
        <h4 class="fw-bold mb-4"><i class="bi bi-speedometer2 me-2 text-primary"></i>Dashboard</h4>
        <div class="row g-3 mb-4">
            <div class="col-sm-6 col-md-3">
                <div class="card text-center border-0 shadow-sm">
                    <div class="card-body">
                        <div class="fs-2 fw-bold text-primary" th:text="${total}">0</div>
                        <div class="text-muted small"><i class="bi bi-person-badge me-1"></i>Conductores registrados</div>
                    </div>
                </div>
            </div>
            <div class="col-sm-6 col-md-3">
                <div class="card text-center border-0 shadow-sm">
                    <div class="card-body">
                        <div class="fs-2 fw-bold text-success" th:text="${activos}">0</div>
                        <div class="text-muted small"><i class="bi bi-check-circle me-1"></i>Conductores activos</div>
                    </div>
                </div>
            </div>
            <div class="col-sm-6 col-md-3">
                <div class="card text-center border-0 shadow-sm">
                    <div class="card-body">
                        <div class="fs-2 fw-bold text-warning" th:text="${total - activos}">0</div>
                        <div class="text-muted small"><i class="bi bi-pause-circle me-1"></i>Inactivos</div>
                    </div>
                </div>
            </div>
            <div class="col-sm-6 col-md-3">
                <div class="card text-center border-0 shadow-sm">
                    <div class="card-body">
                        <div class="fs-2 fw-bold" style="color:#57B9FF">Spring Boot</div>
                        <div class="text-muted small"><i class="bi bi-shield-check me-1"></i>Sistema activo</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/conductores}" class="btn btn-primary"><i class="bi bi-person-badge me-1"></i>Gestionar Conductores</a>
            <a th:href="@{/conductores/nuevo}" class="btn btn-outline-primary"><i class="bi bi-plus-circle me-1"></i>Nuevo Conductor</a>
        </div>
    </main>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
