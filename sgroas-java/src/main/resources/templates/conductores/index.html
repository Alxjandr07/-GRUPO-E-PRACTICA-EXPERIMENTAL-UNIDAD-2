<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conductores | SGROAS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root{--sgroas-blue:#57B9FF;--sgroas-dark:#1a3a5c}
        .navbar-brand{color:var(--sgroas-blue)!important}.btn-primary{background-color:var(--sgroas-blue);border-color:var(--sgroas-blue)}
        .sidebar{min-height:calc(100vh - 56px);background-color:var(--sgroas-dark)}
        .sidebar .nav-link{color:rgba(255,255,255,.75)}.sidebar .nav-link:hover{color:var(--sgroas-blue)}
        .badge-activo{background-color:#198754!important}.badge-inactivo{background-color:#6c757d!important}.badge-suspendido{background-color:#dc3545!important}
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand fw-bold"><i class="bi bi-bus-front-fill me-2" style="color:var(--sgroas-blue)"></i>SGROAS <small class="text-white-50 ms-2" style="font-size:.7rem">Java/Spring Boot</small></span>
    <div class="d-flex align-items-center gap-3">
        <span class="text-white-50 small"><i class="bi bi-person-circle me-1"></i><span sec:authentication="name">Usuario</span></span>
        <form th:action="@{/auth/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-outline-danger btn-sm"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
        </form>
    </div>
</nav>
<div class="container-fluid"><div class="row">
    <nav class="col-md-2 sidebar py-3 d-none d-md-block">
        <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
            <li class="nav-item"><a class="nav-link active" th:href="@{/conductores}"><i class="bi bi-person-badge me-2"></i>Conductores</a></li>
        </ul>
    </nav>
    <main class="col-md-10 ms-sm-auto px-4 py-3">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="fw-bold mb-0"><i class="bi bi-person-badge me-2 text-primary"></i>Conductores</h4>
            <a th:href="@{/conductores/nuevo}" class="btn btn-primary btn-sm"><i class="bi bi-plus-circle me-1"></i>Nuevo Conductor</a>
        </div>

        <!-- Flash messages -->
        <div th:if="${flashSuccess}" class="alert alert-success alert-dismissible fade show">
            <i class="bi bi-check-circle me-1"></i><span th:text="${flashSuccess}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${flashError}" class="alert alert-danger alert-dismissible fade show">
            <i class="bi bi-exclamation-circle me-1"></i><span th:text="${flashError}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Búsqueda -->
        <form th:action="@{/conductores}" method="get" class="mb-3">
            <div class="input-group input-group-sm" style="max-width:380px">
                <input type="text" class="form-control" name="q" th:value="${q}" placeholder="Buscar por nombre, apellido o cédula...">
                <button type="submit" class="btn btn-outline-primary"><i class="bi bi-search"></i></button>
                <a th:if="${q}" th:href="@{/conductores}" class="btn btn-outline-secondary"><i class="bi bi-x"></i></a>
            </div>
        </form>

        <!-- Tabla -->
        <div class="table-responsive">
            <table class="table table-hover table-bordered align-middle small">
                <thead class="table-dark">
                    <tr>
                        <th>#</th><th>Cédula</th><th>Nombre Completo</th><th>Teléfono</th>
                        <th>Licencia</th><th>Venc. Licencia</th><th>Estado</th><th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(conductores)}">
                        <td colspan="8" class="text-center text-muted py-4">
                            <i class="bi bi-inbox fs-3 d-block mb-2"></i>No se encontraron conductores.
                        </td>
                    </tr>
                    <!-- th:text escapa XSS automáticamente -->
                    <tr th:each="c, stat : ${conductores}">
                        <td class="text-muted" th:text="${stat.index + 1}"></td>
                        <td th:text="${c.cedula}"></td>
                        <td th:text="${c.nombreCompleto}"></td>
                        <td th:text="${c.telefono}"></td>
                        <td>
                            <span class="badge bg-secondary" th:text="${c.licenciaTipo}"></span>
                            <span th:text="${c.licenciaNum}"></span>
                        </td>
                        <td th:text="${c.fechaVencLic}"></td>
                        <td>
                            <span class="badge" th:classappend="'badge-' + ${c.estado}" th:text="${c.estado}"></span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/conductores/{id}/editar(id=${c.id})}"
                               class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i></a>
                            <!-- DELETE via POST con CSRF automático de Spring Security -->
                            <form th:action="@{/conductores/{id}/eliminar(id=${c.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('¿Confirma desactivar este conductor?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <p class="text-muted small">Total: <span th:text="${#lists.size(conductores)}">0</span> registro(s)</p>
    </main>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
