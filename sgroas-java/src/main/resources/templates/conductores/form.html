<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${accion} + ' Conductor | SGROAS'">Conductor | SGROAS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root{--sgroas-blue:#57B9FF;--sgroas-dark:#1a3a5c}
        .navbar-brand{color:var(--sgroas-blue)!important}.btn-primary{background-color:var(--sgroas-blue);border-color:var(--sgroas-blue)}
        .sidebar{min-height:calc(100vh - 56px);background-color:var(--sgroas-dark)}
        .sidebar .nav-link{color:rgba(255,255,255,.75)}.sidebar .nav-link:hover{color:var(--sgroas-blue)}
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand fw-bold"><i class="bi bi-bus-front-fill me-2" style="color:var(--sgroas-blue)"></i>SGROAS <small class="text-white-50 ms-2" style="font-size:.7rem">Java/Spring Boot</small></span>
    <div class="d-flex align-items-center gap-3">
        <span class="text-white-50 small"><i class="bi bi-person-circle me-1"></i><span sec:authentication="name">Usuario</span></span>
        <form th:action="@{/auth/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-outline-danger btn-sm"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
        </form>
    </div>
</nav>
<div class="container-fluid"><div class="row">
    <nav class="col-md-2 sidebar py-3 d-none d-md-block">
        <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/conductores}"><i class="bi bi-person-badge me-2"></i>Conductores</a></li>
        </ul>
    </nav>
    <main class="col-md-10 ms-sm-auto px-4 py-3">

        <div class="d-flex align-items-center gap-2 mb-3">
            <a th:href="@{/conductores}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
            <h4 class="fw-bold mb-0">
                <i class="bi bi-person-plus me-2 text-primary"></i>
                <span th:text="${accion} + ' Conductor'"></span>
            </h4>
        </div>

        <div th:if="${error}" class="alert alert-danger">
            <i class="bi bi-exclamation-circle me-1"></i><span th:text="${error}"></span>
        </div>

        <div class="card shadow-sm" style="max-width:720px">
        <div class="card-body">
        <!-- Thymeleaf inyecta CSRF automáticamente en todos los forms POST -->
        <form th:action="${conductor.id == null ? '/conductores/nuevo' : '/conductores/' + conductor.id + '/editar'}"
              th:object="${conductor}" method="post" novalidate>

            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Cédula *</label>
                    <input type="text" class="form-control" th:field="*{cedula}" maxlength="13"
                           th:classappend="${#fields.hasErrors('cedula')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{cedula}"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Nombres *</label>
                    <input type="text" class="form-control" th:field="*{nombres}" maxlength="80"
                           th:classappend="${#fields.hasErrors('nombres')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{nombres}"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Apellidos *</label>
                    <input type="text" class="form-control" th:field="*{apellidos}" maxlength="80"
                           th:classappend="${#fields.hasErrors('apellidos')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{apellidos}"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Teléfono *</label>
                    <input type="text" class="form-control" th:field="*{telefono}" maxlength="15" placeholder="09XXXXXXXX"
                           th:classappend="${#fields.hasErrors('telefono')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{telefono}"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" class="form-control" th:field="*{email}" maxlength="150"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{email}"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Estado *</label>
                    <select class="form-select" th:field="*{estado}">
                        <option value="activo">Activo</option>
                        <option value="inactivo">Inactivo</option>
                        <option value="suspendido">Suspendido</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Tipo Licencia *</label>
                    <select class="form-select" th:field="*{licenciaTipo}"
                            th:classappend="${#fields.hasErrors('licenciaTipo')} ? 'is-invalid'">
                        <option value="A">Tipo A</option>
                        <option value="B">Tipo B</option>
                        <option value="C">Tipo C</option>
                        <option value="D">Tipo D</option>
                        <option value="E">Tipo E</option>
                        <option value="F">Tipo F</option>
                    </select>
                    <div class="invalid-feedback" th:errors="*{licenciaTipo}"></div>
                </div>
                <div class="col-md-5">
                    <label class="form-label fw-semibold">N° de Licencia *</label>
                    <input type="text" class="form-control" th:field="*{licenciaNum}" maxlength="20"
                           th:classappend="${#fields.hasErrors('licenciaNum')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{licenciaNum}"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Vencimiento Licencia</label>
                    <input type="date" class="form-control" th:field="*{fechaVencLic}">
                </div>
            </div>

            <hr class="my-3">
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save me-1"></i>
                    <span th:text="${conductor.id == null ? 'Guardar Conductor' : 'Actualizar Conductor'}"></span>
                </button>
                <a th:href="@{/conductores}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
        </div>
        </div>
    </main>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
